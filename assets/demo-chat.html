<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Team Chat</title>
<style>
  :root {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    color-scheme: light;
  }
  body { margin: 0; display: flex; height: 100vh; background: #fff; color: #1d1c1d; }
  aside {
    width: 200px; background: #3f2a47; color: #d5c9da; padding: 16px 0; flex-shrink: 0;
  }
  aside h1 { font-size: 15px; color: #fff; margin: 0 16px 14px; }
  aside .ch { padding: 4px 16px; font-size: 14px; }
  aside .ch.active { background: #5f3f6e; color: #fff; border-radius: 0; }
  main { flex: 1; display: flex; flex-direction: column; }
  header {
    padding: 12px 20px; border-bottom: 1px solid #e2e2e2;
    font-weight: 700; font-size: 15px;
  }
  #log { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .msg { display: flex; gap: 10px; margin-bottom: 14px; }
  .ava {
    width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0;
    display: grid; place-items: center; color: #fff; font-weight: 700; font-size: 14px;
  }
  .msg .name { font-weight: 700; font-size: 14px; }
  .msg .time { font-weight: 400; font-size: 11px; color: #888; margin-left: 6px; }
  .msg .body { font-size: 14px; line-height: 1.45; white-space: pre-wrap; }
  footer { padding: 0 20px 20px; }
  #input {
    width: 100%; box-sizing: border-box; border: 1.5px solid #d0d0d0; border-radius: 8px;
    padding: 10px 12px; font: inherit; font-size: 14px; min-height: 42px; resize: none;
  }
  #input:focus { outline: none; border-color: #8b6a9c; }
</style>
</head>
<body>
  <aside>
    <h1>peachtree co.</h1>
    <div class="ch"># announcements</div>
    <div class="ch active"># general</div>
    <div class="ch"># random</div>
    <div class="ch"># design</div>
  </aside>
  <main>
    <header># general</header>
    <div id="log">
      <div class="msg">
        <div class="ava" style="background:#c4633f">MK</div>
        <div>
          <div><span class="name">Mike</span><span class="time">14:02</span></div>
          <div class="body">Guys, it's Sarah's birthday today! 🎉 Drop something nice in the thread</div>
        </div>
      </div>
      <div class="msg">
        <div class="ava" style="background:#5b8a4e">JL</div>
        <div>
          <div><span class="name">Jules</span><span class="time">14:03</span></div>
          <div class="body">happy bday Sarah!! 🥳</div>
        </div>
      </div>
    </div>
    <footer>
      <textarea id="input" placeholder="Message #general" rows="1"></textarea>
    </footer>
  </main>
<script>
  const input = document.getElementById("input");
  const log = document.getElementById("log");
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      const time = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      const el = document.createElement("div");
      el.className = "msg";
      el.innerHTML = `
        <div class="ava" style="background:#4a6da7">ME</div>
        <div>
          <div><span class="name">You</span><span class="time">${time}</span></div>
          <div class="body"></div>
        </div>`;
      el.querySelector(".body").textContent = text;
      log.appendChild(el);
      log.scrollTop = log.scrollHeight;
      input.value = "";
    }
  });
  input.focus();
</script>
</body>
</html>
